<div class="form-wrapper">
  <div class="form-container">
    <form id="gstrForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input id="gst" maxlength="15" required />
          </div>
        </div>

        <div class="form-group">
          <label>ID</label>
          <div class="input-box">
            <i class="fas fa-hashtag"></i>
            <input type="number" required />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" required />
          </div>
        </div>

        <div class="form-group">
          <label>Concern Person</label>
          <div class="input-box">
            <i class="fas fa-user-tie"></i>
            <input required />
          </div>
        </div>

        <div class="form-group">
          <label>Contact No</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input id="phone" maxlength="10" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input id="email" type="email" required />
          </div>
        </div>

        <div class="form-group">
          <label>Periodicity</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select id="monthList" required></select>
          </div>
        </div>

        <div class="form-group">
          <label>Start Month</label>
          <div class="input-box dropdown">
            <i class="fas fa-play"></i>
            <select id="startMonth" required></select>
          </div>
        </div>

        <div class="form-group">
          <label>End Month</label>
          <div class="input-box dropdown">
            <i class="fas fa-stop"></i>
            <select id="endMonth" required></select>
          </div>
        </div>
      </div>

      <button class="form-btn">Submit</button>
    </form>
  </div>
</div>

<style>
  /* 🔥 CENTER FULL PAGE */
  .form-wrapper {
    height: calc(10vh - 80px);
    display: flex;

    align-items: flex-start; /* 🔥 move up */
    justify-content: center;

    padding-top: -1px; /* 🔥 control exact position */
  }

  /* 🔥 CONTAINER */
  .form-container {
    width: 100%;
    max-width: 950px;

    padding: 25px;

    border-radius: 14px;

    /* GLASS EFFECT */
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.25);

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  }

  /* GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* LABEL */
  .form-group label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  /* INPUT BOX */
  .input-box {
    position: relative;
    display: flex;
    align-items: center;
    border-radius: 8px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);

    padding-left: 35px;
  }

  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
  }
  .input-box.dropdown::after {
    transition: 0.2s;
  }

  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }
  /* ICON */
  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  /* INPUT + SELECT */
  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #111; /* 🔥 important */
  }

  /* SELECT FIX */
  .input-box select {
    appearance: none;
    cursor: pointer;
  }
  /* ONLY DROPDOWN ARROW */
  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
    transition: 0.2s;
  }

  /* ROTATE ON FOCUS */
  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }

  /* ADD ARROW ONLY WHEN SELECT EXISTS */
  .input-box:has(select)::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
  }
  /* FOCUS */
  .input-box:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
  }

  /* BUTTON */
  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 100px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
  .input-box select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background: transparent;
    cursor: pointer;

    min-height: 36px; /* 🔥 important */
  }

  /* custom arrow */
  .input-box {
    position: relative;
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    const monthList = document.getElementById("monthList");
    const start = document.getElementById("startMonth");
    const end = document.getElementById("endMonth");

    if (!monthList || !start || !end) return;

    // default
    monthList.innerHTML = `<option disabled selected>Select Month</option>`;
    start.innerHTML = `<option disabled selected>Select Month</option>`;
    end.innerHTML = `<option disabled selected>Select Month</option>`;

    // fill
    months.forEach((m) => {
      monthList.innerHTML += `<option value="${m}">${m}</option>`;
      start.innerHTML += `<option value="${m}">${m}</option>`;
      end.innerHTML += `<option value="${m}">${m}</option>`;
    });

    // filter end month
    start.addEventListener("change", () => {
      const startIndex = months.indexOf(start.value);

      end.innerHTML = `<option disabled selected>Select Month</option>`;

      months.forEach((m, i) => {
        if (i > startIndex) {
          end.innerHTML += `<option value="${m}">${m}</option>`;
        }
      });
    });
  })();
</script>
