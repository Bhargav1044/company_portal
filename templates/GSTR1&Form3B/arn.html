<div class="form-wrapper">
  <div class="form-container">
    <form id="arnForm">
      <div class="form-grid">
        <!-- GST NO -->
        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input
              id="gst"
              maxlength="15"
              required
              pattern="[0-9A-Z]{15}"
              title="15 uppercase alphanumeric"
            />
          </div>
        </div>

        <!-- MONTH -->
        <div class="form-group">
          <label>Month</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select id="monthList" required></select>
          </div>
        </div>

        <!-- ARN STATUS -->
        <!-- ARN -->
        <div class="form-group">
          <label>GSTR1 ARN</label>

          <!-- DROPDOWN -->
          <div class="input-box dropdown" id="arnDropdownBox">
            <i class="fas fa-list"></i>
            <select id="arnSelect" required>
              <option disabled selected>Select ARN Status</option>
              <option>Filed by Client</option>
              <option>Client Exited</option>
              <option>Cancelled</option>
              <option>NA</option>
              <option value="manual">Enter Manually</option>
            </select>
          </div>

          <!-- MANUAL INPUT (HIDDEN INITIALLY) -->
          <div
            class="input-box"
            id="manualArnBox"
            style="display: none; margin-top: 8px"
          >
            <i class="fas fa-keyboard"></i>
            <input id="manualArn" placeholder="Enter ARN Number" />
          </div>
        </div>

        <!-- DATE -->
        <div class="form-group">
          <label>Filing Date</label>
          <div class="input-box">
            <i class="fas fa-calendar-day"></i>
            <input type="date" required />
          </div>
        </div>
      </div>

      <button class="form-btn">Update</button>
    </form>
  </div>
</div>

<style>
  /* WRAPPER */
  .form-wrapper {
    height: calc(100vh - 80px);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin-top: 20px;
  }

  /* CONTAINER */
  .form-container {
    width: 100%;
    max-width: 800px;

    padding: 25px;
    border-radius: 14px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  }

  /* GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* LABEL */
  .form-group label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  /* INPUT BOX */
  .input-box {
    position: relative;
    display: flex;
    align-items: center;

    border-radius: 8px;
    padding-left: 35px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);
  }

  /* ICON */
  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  /* INPUT */
  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #111;
  }

  /* SELECT STYLE */
  .input-box select {
    appearance: none;
    cursor: pointer;
    min-height: 36px;
  }

  /* DROPDOWN ARROW ONLY */
  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
    transition: 0.2s;
  }

  /* ROTATE */
  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }

  /* FOCUS */
  .input-box:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
  }

  /* BUTTON */
  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 120px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    const monthList = document.getElementById("monthList");

    if (!monthList) return;

    // default
    monthList.innerHTML = `<option disabled selected>Select Month</option>`;

    // populate
    months.forEach((m) => {
      monthList.innerHTML += `<option value="${m}">${m}</option>`;
    });

    const arnSelect = document.getElementById("arnSelect");
    const manualBox = document.getElementById("manualArnBox");
    const manualInput = document.getElementById("manualArn");

    arnSelect.addEventListener("change", () => {
      if (arnSelect.value === "manual") {
        manualBox.style.display = "flex";
        manualInput.required = true;
      } else {
        manualBox.style.display = "none";
        manualInput.required = false;
        manualInput.value = "";
      }
    });

    // validation
    document.getElementById("arnForm").addEventListener("submit", function (e) {
      const gst = document.getElementById("gst").value;

      if (!/^[0-9A-Z]{15}$/.test(gst)) {
        alert("GST must be 15 uppercase alphanumeric");
        e.preventDefault();
      }
    });
  })();
</script>
