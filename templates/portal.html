<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Portal — Company Portal</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect
                width="40"
                height="40"
                rx="10"
                fill="white"
                fill-opacity="0.2"
              />
              <path
                d="M20 8L32 14V26L20 32L8 26V14L20 8Z"
                stroke="white"
                stroke-width="2"
                fill="none"
              />
              <circle cx="20" cy="20" r="4" fill="white" />
            </svg>
          </div>
          <h1 class="auth-title">User Portal</h1>
          <p class="auth-subtitle">Sign in or create a new account</p>
        </div>

        <div class="auth-body">
          <div class="portal-actions">
            <a href="/signin" class="btn btn-primary btn-block">Sign In</a>
            <a href="/signup" class="btn btn-secondary btn-block">Sign Up</a>
          </div>
          <p class="auth-footer-text">
            <a class="auth-link" href="/login">← Back to Login</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
