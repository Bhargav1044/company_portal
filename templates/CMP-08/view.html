<div class="form-wrapper">
  <!-- HEADER -->
  <div class="table-header">
    <h2>CMP-08 Records</h2>

    <div class="header-actions">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button onclick="resetFilters()">
        <i class="fas fa-rotate"></i>
      </button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-box">
    <!-- GST FILTER -->
    <div class="gst-filter">
      <button class="filter-btn active" data-value="">All</button>
      <button class="filter-btn" data-value="empty">GST Empty</button>
    </div>

    <!-- QUARTER FILTER -->
    <div class="range-box">
      <label>Quarter</label>
      <select id="quarterFilter">
        <option value="">All</option>
        <option>Apr - Jun 2026</option>
        <option>Jul - Sep 2026</option>
        <option>Oct - Dec 2026</option>
        <option>Jan - Mar 2027</option>
      </select>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GST No</th>
          <th>ID</th>
          <th>Password</th>
          <th>Concern Person</th>
          <th>Contact No</th>
          <th>Email ID</th>
          <th>Periodicity</th>
          <th>Quarter</th>
          <th>CMP-08 ARN No.</th>
          <th>CMP-08 Filing Date</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="11" class="loading">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ================= STYLE ================= -->
<style>
  .form-wrapper {
    padding: 15px;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .table-header h2 {
    font-size: 20px;
    font-weight: 700;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-actions input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    width: 240px;
  }

  .header-actions button {
    background: #27334d;
    color: white;
    border-radius: 10px;
    border: none;
    padding: 10px;
  }

  .filter-box {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .gst-filter {
    display: flex;
    gap: 10px;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #cbd5e1;
    background: white;
    cursor: pointer;
  }

  .filter-btn.active {
    background: #27334d;
    color: white;
    border: none;
  }

  .range-box {
    display: flex;
    flex-direction: column;
  }

  .table-container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-radius: 16px;

    max-height: 420px;
    overflow-y: auto;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.9);
    color: #27334d;
    font-weight: 700;
    padding: 12px;
  }

  td {
    padding: 10px;
  }

  tr:hover {
    background: rgba(37, 99, 235, 0.08);
  }

  .loading {
    text-align: center;
  }
</style>

<!-- ================= SCRIPT ================= -->
<script>
  (function () {
    let data = [
      {
        name: "ABC Pvt Ltd",
        gst: "22AAAAA0000A1Z5",
        id: "101",
        password: "******",
        concern: "John",
        contact: "9876543210",
        email: "abc@email.com",
        periodicity: "Quarterly",
        quarter: "Apr - Jun 2026",
        arn: "Filed",
        date: "2026-07-10",
      },
    ];

    let gstFilterValue = "";

    /* GST FILTER */
    document.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.onclick = () => {
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        gstFilterValue = btn.dataset.value;
        applyFilters();
      };
    });

    function applyFilters() {
      let filtered = [...data];
      const search = document.getElementById("searchInput").value.toLowerCase();
      const quarter = document.getElementById("quarterFilter").value;

      if (gstFilterValue === "empty") {
        filtered = filtered.filter((d) => !d.gst);
      }

      if (quarter) {
        filtered = filtered.filter((d) => d.quarter === quarter);
      }

      if (search) {
        filtered = filtered.filter((d) =>
          Object.values(d).join(" ").toLowerCase().includes(search),
        );
      }

      renderTable(filtered);
    }

    function renderTable(rows) {
      const body = document.getElementById("tableBody");

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="11">No Data Found</td></tr>`;
        return;
      }

      body.innerHTML = rows
        .map(
          (r) => `
      <tr>
        <td>${r.name}</td>
        <td>${r.gst || "-"}</td>
        <td>${r.id}</td>
        <td>${r.password}</td>
        <td>${r.concern}</td>
        <td>${r.contact}</td>
        <td>${r.email}</td>
        <td>${r.periodicity}</td>
        <td>${r.quarter}</td>
        <td>${r.arn}</td>
        <td>${r.date}</td>
      </tr>
    `,
        )
        .join("");
    }

    document
      .getElementById("searchInput")
      .addEventListener("input", applyFilters);
    document
      .getElementById("quarterFilter")
      .addEventListener("change", applyFilters);

    window.resetFilters = function () {
      gstFilterValue = "";
      document
        .querySelectorAll(".filter-btn")
        .forEach((b) => b.classList.remove("active"));
      document
        .querySelector(".filter-btn[data-value='']")
        .classList.add("active");

      document.getElementById("searchInput").value = "";
      document.getElementById("quarterFilter").value = "";

      renderTable(data);
    };

    renderTable(data);
  })();
</script>
