<div class="form-wrapper">
  <div class="form-container">
    <form id="updateForm">
      <div class="form-grid">
        <!-- NAME -->
        <div class="form-group">
          <label>Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" required />
          </div>
        </div>

        <!-- GST -->
        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input id="gst" maxlength="15" required pattern="[0-9A-Z]{15}" />
          </div>
        </div>

        <!-- ID -->
        <div class="form-group">
          <label>ID</label>
          <div class="input-box">
            <i class="fas fa-hashtag"></i>
            <input type="number" required />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" required />
          </div>
        </div>

        <!-- CONCERN -->
        <div class="form-group">
          <label>Concern Person</label>
          <div class="input-box">
            <i class="fas fa-user-tie"></i>
            <input required />
          </div>
        </div>

        <!-- CONTACT -->
        <div class="form-group">
          <label>Contact No</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input maxlength="10" pattern="[0-9]{10}" required />
          </div>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" required />
          </div>
        </div>

        <!-- PERIODICITY -->
        <div class="form-group">
          <label>Periodicity</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select id="monthList" required></select>
          </div>
        </div>
      </div>

      <button class="form-btn">Update</button>
    </form>
  </div>
</div>

<style>
  .form-wrapper {
    padding: 20px;
  }

  .form-container {
    max-width: 900px;
    margin: auto;
    padding: 25px;

    border-radius: 14px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 600;
  }

  .input-box {
    position: relative;
    display: flex;
    align-items: center;

    border-radius: 8px;
    padding-left: 35px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);
  }

  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    background: transparent;
  }

  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
  }

  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 120px;
  }

  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    const monthList = document.getElementById("monthList");

    monthList.innerHTML = `<option disabled selected>Select Month</option>`;

    months.forEach((m) => {
      monthList.innerHTML += `<option>${m}</option>`;
    });

    document
      .getElementById("updateForm")
      .addEventListener("submit", function (e) {
        const gst = document.getElementById("gst").value;

        if (!/^[0-9A-Z]{15}$/.test(gst)) {
          alert("GST must be 15 uppercase alphanumeric");
          e.preventDefault();
        }
      });
  })();
</script>
