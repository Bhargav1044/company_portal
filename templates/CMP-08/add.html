<div class="form-wrapper">
  <div class="form-container">
    <form id="cmpForm">
      <div class="form-grid">
        <!-- NAME -->
        <div class="form-group">
          <label>Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" required />
          </div>
        </div>

        <!-- GST -->
        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input maxlength="15" required pattern="[0-9A-Z]{15}" />
          </div>
        </div>

        <!-- ID -->
        <div class="form-group">
          <label>ID</label>
          <div class="input-box">
            <i class="fas fa-hashtag"></i>
            <input type="number" required />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" required />
          </div>
        </div>

        <!-- PERSON -->
        <div class="form-group">
          <label>Concern Person</label>
          <div class="input-box">
            <i class="fas fa-user-tie"></i>
            <input required />
          </div>
        </div>

        <!-- PHONE -->
        <div class="form-group">
          <label>Contact No</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input maxlength="10" required pattern="[0-9]{10}" />
          </div>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" required />
          </div>
        </div>

        <!-- PERIODICITY -->
        <div class="form-group">
          <label>Periodicity</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select required>
              <option value="Quarterly" selected>Quarterly</option>
            </select>
          </div>
        </div>

        <!-- START QUARTER -->
        <div class="form-group">
          <label>Start Quarter</label>
          <div class="input-box dropdown">
            <i class="fas fa-play"></i>
            <select id="startQuarter" required></select>
          </div>
        </div>

        <!-- END QUARTER -->
        <div class="form-group">
          <label>End Quarter</label>
          <div class="input-box dropdown">
            <i class="fas fa-stop"></i>
            <select id="endQuarter" required></select>
          </div>
        </div>
      </div>

      <button class="form-btn">Submit</button>
    </form>
  </div>
</div>

<style>
  .form-wrapper {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  .form-container {
    width: 100%;
    max-width: 950px;
    padding: 25px;
    border-radius: 14px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 600;
  }

  .input-box {
    position: relative;
    display: flex;
    align-items: center;
    border-radius: 8px;
    padding-left: 35px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);
  }

  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    background: transparent;
  }

  .form-btn {
    margin-top: 15px;
    padding: 10px -5px;
    border-radius: 8px;
    background: #27334d;
    color: white;
    border: none;
  }
</style>

<script>
  (function () {
    const quarters = [
      "Apr - Jun 2026",
      "Jul - Sep 2026",
      "Oct - Dec 2026",
      "Jan - Mar 2027",
    ];

    const start = document.getElementById("startQuarter");
    const end = document.getElementById("endQuarter");

    // fill dropdowns
    start.innerHTML = `<option disabled selected>Select Quarter</option>`;
    end.innerHTML = `<option disabled selected>Select Quarter</option>`;

    quarters.forEach((q) => {
      start.innerHTML += `<option value="${q}">${q}</option>`;
      end.innerHTML += `<option value="${q}">${q}</option>`;
    });

    // prevent same selection
    start.addEventListener("change", () => {
      const selected = start.value;

      end.innerHTML = `<option disabled selected>Select Quarter</option>`;

      quarters.forEach((q) => {
        if (q !== selected) {
          end.innerHTML += `<option value="${q}">${q}</option>`;
        }
      });
    });
  })();
</script>
