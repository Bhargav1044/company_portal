<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Company Portal</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-header">
          <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect
                width="40"
                height="40"
                rx="10"
                fill="white"
                fill-opacity="0.2"
              />
              <path
                d="M20 8L32 14V26L20 32L8 26V14L20 8Z"
                stroke="white"
                stroke-width="2"
                fill="none"
              />
              <circle cx="20" cy="20" r="4" fill="white" />
            </svg>
          </div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to your Company Portal account</p>
        </div>

        <div class="auth-body">
          <div id="signInError" class="alert alert-error"></div>

          <form id="signInForm" novalidate>
            <div class="form-group">
              <label class="form-label" for="signInName">Username</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <input
                  id="signInName"
                  class="form-input"
                  type="text"
                  placeholder="Enter your username"
                  required
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signInPassword">Password</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  id="signInPassword"
                  class="form-input"
                  type="password"
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="toggle-eye"
                  onclick="togglePassword('signInPassword', this)"
                  aria-label="Toggle password visibility"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Sign In
            </button>
          </form>

          <p class="auth-footer-text">
            Don't have an account?
            <a class="auth-link" href="/signup">Sign Up</a>
          </p>
          <p class="auth-footer-text">
            <a class="auth-link" href="/login">← Back to Login</a>
          </p>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
