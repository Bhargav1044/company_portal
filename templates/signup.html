<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Company Portal</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-header">
          <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect
                width="40"
                height="40"
                rx="10"
                fill="white"
                fill-opacity="0.2"
              />
              <path
                d="M20 8L32 14V26L20 32L8 26V14L20 8Z"
                stroke="white"
                stroke-width="2"
                fill="none"
              />
              <circle cx="20" cy="20" r="4" fill="white" />
            </svg>
          </div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Request access to Company Portal</p>
        </div>

        <div class="auth-body">
          <div id="signUpError" class="alert alert-error"></div>
          <div id="signUpSuccess" class="alert alert-success"></div>

          <form id="signUpForm" novalidate>
            <div class="form-group">
              <label class="form-label" for="signUpName">Username</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <input
                  id="signUpName"
                  class="form-input"
                  type="text"
                  placeholder="Choose a username"
                  required
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signUpPassword">Password</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  id="signUpPassword"
                  class="form-input"
                  type="password"
                  placeholder="Create a password"
                  required
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-eye"
                  onclick="togglePassword('signUpPassword', this)"
                  aria-label="Toggle password visibility"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signUpConfirmPassword"
                >Confirm Password</label
              >
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  id="signUpConfirmPassword"
                  class="form-input"
                  type="password"
                  placeholder="Confirm your password"
                  required
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-eye"
                  onclick="togglePassword('signUpConfirmPassword', this)"
                  aria-label="Toggle password visibility"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="signup-notice">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              Your account will require admin approval before you can sign in.
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Request Access
            </button>
          </form>

          <p class="auth-footer-text">
            Already have an account?
            <a class="auth-link" href="/signin">Sign In</a>
          </p>
          <p class="auth-footer-text">
            <a class="auth-link" href="/login">← Back to Login</a>
          </p>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
